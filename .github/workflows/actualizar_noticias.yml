name: Actualizar Noticias Juridicas

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install pandas requests beautifulsoup4 feedparser

      - name: Ejecutar Script de Redacción
        run: python "actualizar_noticias.py"

      - name: Publicar en LinkedIn
        if: success()
        env:
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
        run: |
          # 1. Obtenemos quién es el dueño del token (ID Real)
          USER_INFO=$(curl -s -H "Authorization: Bearer $LINKEDIN_TOKEN" https://api.linkedin.com/v2/userinfo)
          MY_ID=$(echo $USER_INFO | jq -r '.sub')
          
          if [ "$MY_ID" == "null" ] || [ -z "$MY_ID" ]; then
            echo "Error de permisos: Revisa que el token tenga scopes openid y profile."
            exit 1
          fi

          # 2. Preparamos el texto del post
          TEXTO_JSON=$(cat ultimo_post_linkedin.txt | jq -aRs .)
          
          # 3. Publicamos usando la ID dinámica (formato person)
          curl -s -X POST "https://api.linkedin.com/v2/ugcPosts" \
          -H "Authorization: Bearer $LINKEDIN_TOKEN" \
          -H "Content-Type: application/json" \
          -H "X-Restli-Protocol-Version: 2.0.0" \
          -d "{
            \"author\": \"urn:li:person:$MY_ID\",
            \"lifecycleState\": \"PUBLISHED\",
            \"specificContent\": {
              \"com.linkedin.ugc.ShareContent\": {
                \"shareCommentary\": { \"text\": $TEXTO_JSON },
                \"shareMediaCategory\": \"NONE\"
              }
            },
            \"visibility\": { \"com.linkedin.ugc.MemberNetworkVisibility\": \"PUBLIC\" }
          }"
