name: Actualizar Noticias Juridicas

on:
  schedule:
    - cron: '0 6 * * *' # 07:00 AM España
  workflow_dispatch:    # Botón manual

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Instalar dependencias
        run: pip install requests feedparser
          
      - name: Ejecutar Script de Redacción
        run: python "actualizar_noticias.py"
  
      - name: Publicar en LinkedIn
        if: success()
        env:
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
        run: |
          # 1. Obtener la ID real del perfil vinculado al Token
          USER_INFO=$(curl -s -H "Authorization: Bearer $LINKEDIN_TOKEN" https://api.linkedin.com/v2/userinfo)
          
          # 2. Extraer el valor 'sub' (que es la ID única de OpenID)
          MY_ID=$(echo $USER_INFO | jq -r '.sub')
          
          echo "Publicando como ID: $MY_ID"
          
          # 3. Preparar el texto
          TEXTO_JSON=$(cat ultimo_post_linkedin.txt | jq -aRs .)
          
          # 4. Publicar usando la ID dinámica
          curl -s -X POST "https://api.linkedin.com/v2/ugcPosts" \
          -H "Authorization: Bearer $LINKEDIN_TOKEN" \
          -H "Content-Type: application/json" \
          -H "X-Restli-Protocol-Version: 2.0.0" \
          -d "{
            \"author\": \"urn:li:person:$MY_ID\",
            \"lifecycleState\": \"PUBLISHED\",
            \"specificContent\": {
              \"com.linkedin.ugc.ShareContent\": {
                \"shareCommentary\": { \"text\": $TEXTO_JSON },
                \"shareMediaCategory\": \"NONE\"
              }
            },
            \"visibility\": { \"com.linkedin.ugc.MemberNetworkVisibility\": \"PUBLIC\" }
          }"      - name: Subir cambios
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add .
          git commit -m "Sincronización y Post" || echo "Sin cambios"
          git pull origin main --rebase --autostash
          git push origin main
