name: Actualizar Noticias Juridicas

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          pip install feedparser requests  # <-- ESTO ES LO QUE FALTABA

      - name: Ejecutar Bot
        run: python actualizar_noticias.py
        
      - name: Publicar en LinkedIn
        if: success()
        env:
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
        run: |
          # 1. Obtener ID
          USER_INFO=$(curl -s -H "Authorization: Bearer $LINKEDIN_TOKEN" https://api.linkedin.com/v2/userinfo)
          MY_ID=$(echo $USER_INFO | jq -r '.sub')

          # 2. Leer archivos generados por Python
          TEXTO=$(cat texto_ready.txt | jq -Rs .)
          URL=$(cat url_ready.txt | tr -d '[:space:]')

          # 3. Publicar (Todo en un único comando limpio)
          curl -s -X POST "https://api.linkedin.com/v2/ugcPosts" \
          -H "Authorization: Bearer $LINKEDIN_TOKEN" \
          -H "Content-Type: application/json" \
          -H "X-Restli-Protocol-Version: 2.0.0" \
          -d "{
            \"author\": \"urn:li:person:$MY_ID\",
            \"lifecycleState\": \"PUBLISHED\",
            \"specificContent\": {
              \"com.linkedin.ugc.ShareContent\": {
                \"shareCommentary\": { \"text\": $TEXTO },
                \"shareMediaCategory\": \"ARTICLE\",
                \"media\": [{
                  \"status\": \"READY\",
                  \"originalUrl\": \"$URL\"
                }]
              }
            },
            \"visibility\": { \"com.linkedin.ugc.MemberNetworkVisibility\": \"PUBLIC\" }
          }"
      - name: Configurar Git y Guardar Cambios
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add noticias.json historico_noticias.csv
          git commit -m "Update noticias e historico [skip ci]" || echo "No hay cambios que commitear"
          git push
