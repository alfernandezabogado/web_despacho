name: Ejecucion Diaria Bot Juridico

on:
  schedule:
    - cron: '0 6 * * *' # 07:00 AM hora de España (6:00 UTC)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Ejecutar Bot
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        # Corregido: usamos el nombre real del archivo en tu repositorio
        run: python actualizar_noticias.py

      - name: Guardar cambios en el repositorio
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          # Agregamos solo si los archivos existen para evitar errores
          git add noticias.json || echo "noticias.json no encontrado"
          git add historico_noticias.csv || echo "historico_noticias.csv no encontrado"
          git commit -m "Bot: Actualización diaria [$(date)]" || echo "No hay cambios para subir"
          git push
