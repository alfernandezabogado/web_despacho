name: Ejecucion Diaria Bot Juridico

on:
  schedule:
    - cron: '0 6 * * *' # 07:00 AM hora de España (6:00 UTC)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          pip install feedparser requests

      - name: Ejecutar Script de Redacción
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python actualizar_noticias.py

      - name: Publicar en LinkedIn
        if: success()
        env:
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
        run: |
          # 1. Obtener ID del perfil
          USER_INFO=$(curl -s -H "Authorization: Bearer $LINKEDIN_TOKEN" https://api.linkedin.com/v2/userinfo)
          MY_ID=$(echo $USER_INFO | jq -r '.sub')

          # 2. Leer archivos generados por Python
          # Usamos jq para procesar el texto y que no rompa el JSON del curl
          TEXTO=$(cat texto_ready.txt | jq -Rs .)
          URL=$(cat url_ready.txt | tr -d '[:space:]')

          # 3. Publicar con tarjeta visual grande (ARTICLE)
          curl -s -X POST "https://api.linkedin.com/v2/ugcPosts" \
          -H "Authorization: Bearer $LINKEDIN_TOKEN" \
          -H "Content-Type: application/json" \
          -H "X-Restli-Protocol-Version: 2.0.0" \
          -d "{
            \"author\": \"urn:li:person:$MY_ID\",
            \"lifecycleState\": \"PUBLISHED\",
            \"specificContent\": {
              \"com.linkedin.ugc.ShareContent\": {
                \"shareCommentary\": { \"text\": $TEXTO },
                \"shareMediaCategory\": \"ARTICLE\",
                \"media\": [{
                  \"status\": \"READY\",
                  \"originalUrl\": \"$URL\"
                }]
              }
            },
            \"visibility\": { \"com.linkedin.ugc.MemberNetworkVisibility\": \"PUBLIC\" }
          }"

      - name: Guardar cambios en el repositorio
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add noticias.json historico_noticias.csv
          git commit -m "Bot: Actualización diaria $(date +'%Y-%m-%d')" || echo "No hay cambios para subir"
          git push
