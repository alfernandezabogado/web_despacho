name: Ejecucion Diaria Bot Juridico

on:
  schedule:
    - cron: '0 6 * * *' # 07:00 AM hora de España (6:00 UTC)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Permisos necesarios para que el bot pueda escribir en tu repositorio
    permissions:
      contents: write
      
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Ejecutar Bot
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python bot_juridico.py

      - name: Guardar cambios en el repositorio
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add noticias.json historico_noticias.csv
          git commit -m "Bot: Actualización diaria de noticias y PDF [$(date)]" || echo "No hay cambios para subir"
          git push
