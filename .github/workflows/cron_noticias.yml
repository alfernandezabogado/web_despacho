name: Actualizar Noticias Jurídicas
on:
  schedule:
    - cron: '0 6 * * *' # 07:00 AM España
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Instalar dependencias
        run: pip install requests feedparser
          
      - name: Ejecutar Script
        run: python "actualizar_noticias.py"
        
      - name: Publicar en LinkedIn
        if: success()
        env:
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
        run: |
          TEXTO=$(cat ultimo_post_linkedin.txt)
          # Aquí iría el comando 'curl' que usa tu Person ID para publicar el comentario
          # Es vital que el Person ID sea el tuyo personal.

      - name: Subir cambios
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add .
          git commit -m "v56: Sincronización y Post Profesional" || echo "Sin cambios"
          git push
