name: Actualizar Noticias Jurídicas
on:
  schedule:
    - cron: '0 4 * * *' # 05:00 AM hora española
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml feedparser
          
      - name: Ejecutar Script
        env:
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
        run: python actualizar_noticias.py
        
      - name: Subir cambios
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          # El truco está aquí: traemos los cambios remotos antes de subir los nuestros
          git pull origin main --rebase 
          git add noticias.json historico_noticias.csv
          git commit -m "v55: Sincronización de flujo y corrección de push" || echo "Sin cambios"
          git push origin main
