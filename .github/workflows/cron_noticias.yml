name: Actualizar Noticias Jurídicas
on:
  schedule:
    - cron: '0 6 * * *' # 07:00 AM hora española
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml feedparser
          
      - name: Ejecutar Script
        env:
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
        run: python actualizar_noticias.py
        
      - name: Subir cambios
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          
          # 1. Preparamos los archivos generados por el script
          git add noticias.json historico_noticias.csv
          
          # 2. Hacemos el commit localmente
          git commit -m "v56: Sincronización forzada y limpieza de flujo" || echo "Sin cambios"
          
          # 3. Ahora sí, traemos lo que haya en la web y subimos lo nuevo
          git pull origin main --rebase
          git push origin main
