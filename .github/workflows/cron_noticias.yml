name: Actualizar Noticias Jurídicas
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Instalar dependencias
        run: pip install requests feedparser
          
      - name: Ejecutar Script
        run: python "actualizar_noticias.py"
        
       - name: Publicar en LinkedIn
        if: success()
        env:
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
          LINKEDIN_ID: ${{ secrets.LINKEDIN_ID }}
        run: |
          # --- LÍNEA DE DIAGNÓSTICO ---
          # Esto imprimirá tu ID real en la consola de GitHub Actions
          echo "Consultando ID real a LinkedIn..."
          curl -H "Authorization: Bearer $LINKEDIN_TOKEN" https://api.linkedin.com/v2/me
          
          # --- PUBLICACIÓN SEGURA ---
          TEXTO_JSON=$(cat ultimo_post_linkedin.txt | jq -aRs .)
          
          curl -X POST "https://api.linkedin.com/v2/ugcPosts" \
          -H "Authorization: Bearer $LINKEDIN_TOKEN" \
          -H "Content-Type: application/json" \
          -H "X-Restli-Protocol-Version: 2.0.0" \
          -d "{
            \"author\": \"urn:li:person:${LINKEDIN_ID}\",
            \"lifecycleState\": \"PUBLISHED\",
            \"specificContent\": {
              \"com.linkedin.ugc.ShareContent\": {
                \"shareCommentary\": { \"text\": $TEXTO_JSON },
                \"shareMediaCategory\": \"NONE\"
              }
            },
            \"visibility\": { \"com.linkedin.ugc.MemberNetworkVisibility\": \"PUBLIC\" }
          }"
      - name: Subir cambios
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add .
          git commit -m "v56: Sincronización fija" || echo "Sin cambios"
          git pull origin main --rebase --autostash
          git push origin main
