name: Actualizar Noticias Jurídicas
on:
  schedule:
    - cron: '0 6 * * *' # 07:00 AM hora española
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          # Añadimos feedparser y requests para que el bot no falle
          pip install requests beautifulsoup4 lxml feedparser
          
      - name: Ejecutar Script
        env:
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
        # Asegúrate de que el nombre del archivo coincida exactamente
        run: python "actualizar_noticias.py"
        
      - name: Subir cambios
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          
          # 1. Añadimos los archivos que el bot actualiza
          git add noticias.json historico_noticias.csv log_linkedin.txt
          
          # 2. Confirmamos los cambios
          git commit -m "Sincronización automática: Familia y LinkedIn restaurados" || echo "Sin cambios"
          
          # 3. Sincronizamos con el servidor para evitar errores de escritura
          git pull origin main --rebase
          git push origin main
