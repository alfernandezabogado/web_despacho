name: Actualizar Noticias Jurídicas
on:
  schedule:
    - cron: '0 6 * * *' # 07:00 AM España
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Instalar dependencias
        run: pip install requests feedparser
          
      - name: Ejecutar Script de Redacción
        run: python "actualizar_noticias.py"
        
      - name: Publicar en LinkedIn
        if: success()
        env:
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
          LINKEDIN_ID: ${{ secrets.LINKEDIN_ID }}
        run: |
          # Leemos el texto generado por el script de Python
          TEXTO=$(cat ultimo_post_linkedin.txt)
          
          # Enviamos el post a LinkedIn usando tu ID y Token de los Secrets
          curl -X POST "https://api.linkedin.com/v2/ugcPosts" \
          -H "Authorization: Bearer $LINKEDIN_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{
            \"author\": \"urn:li:person:$LINKEDIN_ID\",
            \"lifecycleState\": \"PUBLISHED\",
            \"specificContent\": {
              \"com.linkedin.ugc.ShareContent\": {
                \"shareCommentary\": { \"text\": \"$TEXTO\" },
                \"shareMediaCategory\": \"NONE\"
              }
            },
            \"visibility\": { \"com.linkedin.ugc.MemberNetworkVisibility\": \"PUBLIC\" }
          }"

      - name: Subir cambios
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          
          # Añadimos todos los archivos modificados
          git add noticias.json historico_noticias.csv log_linkedin.txt ultimo_post_linkedin.txt
          
          # Confirmamos los cambios (si existen)
          git commit -m "v56: Sincronización y Post Profesional" || echo "Sin cambios"
          
          # Sincronización agresiva para evitar el error 'rejected - fetch first'
          git pull origin main --rebase --autostash
          
          # Empujamos los cambios definitivos
          git push origin main
